name: Deploy Automático para Lightsail

on:
  push:
    branches:
      - main # O robô só será ativado quando enviar atualizações para a branch main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Executando comandos no servidor AWS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Entra na pasta do seu projeto no servidor
            cd /home/bitnami/htdocs/Zilmer-teste2
            
            # 2. Baixa as alterações novas do GitHub
            sudo git pull origin main
            
            # 3. Garante que pacotes novos sejam instalados (se houver)
            npm install
            
            # 4. Limpa o cache antigo
            sudo rm -rf .next
            
            # 5. Gera a build nova e atualizada
            npm run build
            
            # 6. Reinicia o site para aplicar as mudanças
            pm2 restart next-app
